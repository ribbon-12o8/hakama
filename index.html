<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卒業袴</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 20px;
      background: linear-gradient(135deg, #fdeeff, #e0f7ff);
      font-family: "Helvetica Neue", sans-serif;
      color: #59240c;
    }

    .card {
      background: linear-gradient(180deg, #ffffff, #f9f9ff);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      margin: 0 auto 20px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .card:nth-of-type(1) { animation-delay: 0.2s; }
    .card:nth-of-type(2) { animation-delay: 0.4s; }
    .card:nth-of-type(3) { animation-delay: 0.6s; }
    .card:nth-of-type(4) { animation-delay: 0.8s; }
    .card:nth-of-type(5) { animation-delay: 1s; } 

    ul {
      list-style-type: none;
      background: linear-gradient(135deg, #bbefff, #c6d3ff);
      padding: 15px;
      border-radius: 10px;
    }

    li::before {
      content: "💙 ";
    }

    li {
      transition: 0.3s;
      margin: 8px 0;
    }

    li:hover {
      transform: scale(1.1);
      color: #ff4da6;
    }

    li:hover::before {
      content: "💖 ";
    }

    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      to {
       opacity: 1;
       transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      color: #cb0066;
    }

    h2 {
      text-align: center;
      color: #787fff;
      border-bottom: 2px dashed #1c4c95;
      padding-bottom: 5px;
      text-decoration: none;
    }

    h3 {
      color: #1c4c95;
    }

    p1 {
      font-size: 1.1em;
      color: #1c4c95;
    }

    p2 {
      text-align: center;
      font-size: 0.8em;
      color: #59240c;
    }



    h2:hover {
      color: #ff4da6;
      border-bottom-color: #1c4c95;
    }

  .photo {
      width: 100%;
      max-width: 200px;
      border-radius: 15px;
      transition: 0.3s;
    }

  .photo:hover {
      transform: scale(1.05);
    }

  .gallery {
    display: flex;
    gap: 20px;
  }

  .gallery {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  </style>
</head>

<body>
  <body ontouchstart="">
  <h1>HAKAMA</h1>

  <div class="card fade-in">
    <a href="https://www.maimu.co.jp/" target="_blank">
      <h2>MAIMU</h2>
    </a>

    <div class="gallery">
      <a href="https://www.maimu.co.jp/hakama/products/t121/" target="_blank">
        <img src="袴画像/ジュビってる.png" class="photo">
      </a>

      <a href="https://www.maimu.co.jp/hakama/products/140/" target="_blank">
        <img src="袴画像/紫かわい.png" class="photo">
      </a>
    </div>

  </div>

  <div class="card fade-in">
    <a href="https://www.saganokan.com/" target="_blank">
      <h2>さがの館</h2>
    </a>

    <div class="gallery">
      <a href="https://www.saganokan.com/hakama/item/30205/" target="_blank">
        <img src="袴画像/ラプぽい.webp" class="photo">
      </a>

      <a href="https://www.saganokan.com/hakama/item/3160/" target="_blank">
        <img src="袴画像/ジュビ2.webp" class="photo">
      </a>
    </div>

  </div>


  <div class="card fade-in">
    <a href="https://www.rental-kimonohime.net/" target="_blank">
      <h2>着物姫</h2>
    </a>

      <a href="https://www.rental-kimonohime.net/products/detail/1483" target="_blank">
        <img src="袴画像/ウエスタンフラワー.webp" class="photo">
      </a>

      </a>
    </div>

  </div>

  <div class="card fade-in">
    <a href="https://portal.kimono-hearts.co.jp/" target="_blank">
      <h2>kimono hearts</h2>
    </a>

      <a href="https://portal.kimono-hearts.co.jp/coordelabel/hakamani/nkh-138_rh99/" target="_blank">
        <img src="袴画像/薔薇フリル.jpg" class="photo">
      </a>

      </a>
    </div>

  </div>

 


</body>
</html>
